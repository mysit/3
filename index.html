<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Unbounded:wght@200..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="form" id="form-container">
        <form id="contactForm">
            <div class="form-group">
                <label for="fullName" class="required">ФИО</label>
                <input type="text" id="fullName" name="fullName" required placeholder="Введите ваше полное имя">
            </div>

            <div class="form-group">
                <label for="email" class="required">Email</label>
                <input type="email" id="email" name="email" required placeholder="example@domain.com">
            </div>

            <div class="form-group">
                <label for="phone">Телефон</label>
                <input type="tel" id="phone" name="phone" placeholder="+7 (XXX) XXX-XX-XX">
            </div>

            <div class="form-group">
                <label for="bdate">Дата рождения</label>
                <input type="date" id="bdate" name="bdate" placeholder="bday">
            </div>

            <div class="form-group">
                <label>Пол</label>
                <div>
                    <input type="radio" id="gender-male" name="gender" value="male">
                    <label for="gender-male">Мужской</label>
                    
                    <input type="radio" id="gender-female" name="gender" value="female">
                    <label for="gender-female">Женский</label>
                </div>
            </div>

        <div class="form-group">
        <label for="languages">Любимый язык программирования:</label>
        <select id="languages" name="languages[]" multiple="multiple" required size="5">
            <option value="">-- Выберите язык --</option>
            <option value="1a0caebb-268b-11f1-a59b-bc241103b411">Pascal</option>
            <option value="1a0cb9c9-268b-11f1-a59b-bc241103b411">C</option>
            <option value="1a0cbde6-268b-11f1-a59b-bc241103b411">C++</option>
            <option value="1a0cbf43-268b-11f1-a59b-bc241103b411">JavaScript</option>
            <option value="1a0cc059-268b-11f1-a59b-bc241103b411">PHP</option>
            <option value="1a0cc194-268b-11f1-a59b-bc241103b411">Python</option>
            <option value="1a0cc290-268b-11f1-a59b-bc241103b411">Java</option>
            <option value="1a0cc367-268b-11f1-a59b-bc241103b411">Haskell</option>
            <option value="1a0cc445-268b-11f1-a59b-bc241103b411">Clojure</option>
            <option value="1a0cc6c0-268b-11f1-a59b-bc241103b411">Prolog</option>
            <option value="scala">Scala</option>
            <option value="1a0cc986-268b-11f1-a59b-bc241103b411">Go</option>
        </select>
    </div>

            <div class="form-group">
                <label for="bio" class="required">Биография</label>
                <textarea id="bio" name="bio" required placeholder="Опишите вас..."></textarea>
            </div>

            <div class="checkbox-container">
                <input type="checkbox" id="privacy" name="privacy" required>
                <label for="privacy">
                    С контрактом ознакомлен.
                </label>
            </div>
            <button type="submit" id="submit_form" class="form_btn">Сохранить</button>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
